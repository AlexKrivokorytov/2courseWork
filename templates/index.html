{% extends "base.html" %}

{% block content %}
<header>
    <h1>🎮 Games Catalog</h1>
    <form action="{{ url_for('index') }}" method="GET" style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" name="search" placeholder="Search..." value="{{ search }}">
        <select name="sort" onchange="this.form.submit()">
            <option value="title" {% if sort == 'title' %}selected{% endif %}>By Title</option>
            <option value="release_date" {% if sort == 'release_date' %}selected{% endif %}>Newest First</option>
            <option value="user_score" {% if sort == 'user_score' %}selected{% endif %}>Top Rated</option>
        </select>
        <button type="submit">Search</button>
    </form>
</header>

<div class="game-grid">
    {% for game in games %}
    <div class="game-card">
        <a href="{{ url_for('game', game_id=game.id) }}">
            <img src="{{ game.cover_url or 'https://via.placeholder.com/200x300' }}" class="card-image">
        </a>
        <div class="card-content">
            <h3>{{ game.title }}</h3>
            <p>Разработчик: {{ game.developer }}</p>
            <div class="score-badge">⭐ {{ game.avg_score or '—' }}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
