{% extends "base.html" %}

{% block content %}
<div style="background:#1e1e1e; padding:20px; border-radius:5px;">
    <h1>Add New Game</h1>
    <form method="post">
        <label>Title:</label><input type="text" name="title" required>
        <label>Release Date:</label><input type="date" name="release_date" required>
        <label>Cover URL:</label><input type="text" name="cover_url">
        
        <label>Developer:</label>
        <select name="developer_id" required>
            {% for d in developers %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>

        <label>Publisher:</label>
        <select name="publisher_id" required>
            {% for p in publishers %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
        </select>

        <label>Description:</label><textarea name="description" rows="4" required></textarea>
        <button type="submit">Save Game</button>
    </form>
</div>
{% endblock %}
