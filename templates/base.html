<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игровая База</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="wrap">
    <nav>
        <a href="{{ url_for('index') }}">🏠 Home</a>
        <a href="{{ url_for('add_game') }}">➕ Add Game</a>
        <a href="{{ url_for('statistics') }}">📊 Statistics</a>
        <a href="{{ url_for('logs') }}">🛡️ Logs</a>
        {% if session.username %}
            <span style="margin-left:auto">👤 {{ session.username }}</span>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('register') }}" style="margin-left:auto">Register</a>
            <a href="{{ url_for('login') }}">Login</a>
        {% endif %}
    </nav>

    {% with messages = get_flashed_messages() %}{% for m in messages %}
        <article>{{ m }}</article>
    {% endfor %}{% endwith %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
