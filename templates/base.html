<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games DB</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: #f5f0e8; color: #2a1f14; }
        nav { background: #2a1f14; padding: 12px 24px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        nav a { color: #f0e6d3; text-decoration: none; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: auto; }
        .wrap { max-width: 900px; margin: 32px auto; padding: 0 20px; }
        h1, h2, h3 { margin-bottom: 16px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .meta { color: #6b5b4b; margin: 4px 0; font-size: 14px; }
        .game-card, .game-details { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
        .game-main { flex-grow: 1; }
        .cover-small { display: block; max-width: 120px; width: 100%; border-radius: 8px; flex-shrink: 0; }
        .cover-large { width: 180px; border-radius: 8px; flex-shrink: 0; }
        .review-item { padding: 10px 0; border-bottom: 1px solid #eee; }
        a.btn, button.btn {
            display: inline-block; padding: 8px 16px; background: #8b3a1e; color: white;
            border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
            font: inherit; font-size: 14px; margin-top: 10px;
        }
        a.btn:hover, button.btn:hover { background: #6d2c14; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
        .alert.success { background: #e8f5e4; border: 1px solid #b2d8a8; }
        .alert.error { background: #fdecea; border: 1px solid #f5b8b8; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, select { padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font: inherit; width: 100%; }
        select[multiple] { height: 110px; }
        label { font-size: 14px; font-weight: bold; }
        @media (max-width: 700px) {
            .game-card, .game-details { flex-direction: column; }
            .cover-small, .cover-large { max-width: 180px; }
        }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="{{ url_for('index') }}">Games DB</a>
    <a href="{{ url_for('index') }}">Games</a>
    <a href="{{ url_for('add_game') }}">Add Game</a>
    {% if session.username %}
        <span style="color:#f0e6d3; margin-left:auto;">{{ session.username }}</span>
        <a href="{{ url_for('logout') }}">Log Out</a>
    {% else %}
        <a href="{{ url_for('register') }}" style="margin-left:auto;">Register</a>
        <a href="{{ url_for('login') }}">Log In</a>
    {% endif %}
</nav>

<div class="wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
